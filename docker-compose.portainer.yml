version: '3.8'

# ============================================
# Climb Delivery - Portainer Stack
# ============================================
# Stack otimizado para deploy via Portainer UI
# Usa imagens locais (build na VM)
#
# 🎯 O QUE ESTE ARQUIVO FAZ:
# 
# 1. 🗄️ Cria container MySQL (banco de dados)
#    - Acessível internamente via "mysql:3306"
#    - Dados persistem em volume "mysql_data"
# 
# 2. 🔧 Cria container Backend (NestJS API)
#    - Conecta no MySQL via DATABASE_URL
#    - Exposto na internet via Traefik: api.climbdelivery.com.br
# 
# 3. 🌐 Cria container Frontend (Angular)
#    - Serve arquivos estáticos via Nginx
#    - Exposto na internet via Traefik: climbdelivery.com.br
# 
# 🔗 CONEXÕES:
#   Frontend → Backend (via https://api.climbdelivery.com.br)
#   Backend → MySQL (via rede Docker interna: mysql:3306)
#   Internet → Frontend/Backend (via Traefik + SSL automático)
#
# 📋 ANTES DE USAR:
#   1. Fazer build das imagens:
#      docker build -t climb-delivery-backend:latest /opt/climb-delivery-api
#      docker build -t climb-delivery-frontend:latest /opt/climb-delivery-app
#   2. Configurar variáveis de ambiente no Portainer
#   3. Verificar que rede "traefik_public" existe
# ============================================

services:
  # ==========================================
  # MySQL Database
  # ==========================================
  # Container do banco de dados MySQL 8.0
  # Backend conecta aqui via "mysql:3306"
  
  mysql:
    image: mysql:8.0
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # ⚠️ OBRIGATÓRIO - Configure no Portainer!
      MYSQL_DATABASE: ${MYSQL_DATABASE:-climbdelivery}
      MYSQL_USER: ${MYSQL_USER:-climbdelivery_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}  # ⚠️ OBRIGATÓRIO - Configure no Portainer!
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - climb_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Backend API (NestJS)
  # ==========================================
  # Container da API REST em Node.js
  # Conecta no MySQL via DATABASE_URL (mysql:3306)
  # Exposto na internet via Traefik
  
  backend:
    image: climb-delivery-backend:latest
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - mysql
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      # 🔗 Conexão com MySQL - usa nome do serviço "mysql"
      DATABASE_URL: mysql://${MYSQL_USER:-climbdelivery_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-climbdelivery}
      JWT_SECRET: ${JWT_SECRET}  # ⚠️ OBRIGATÓRIO - Configure no Portainer!
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://${WEB_DOMAIN:-climbdelivery.com.br}}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}  # ⚠️ OBRIGATÓRIO para emails - Configure no Portainer!
      MAIL_PASSWORD: ${MAIL_PASSWORD}  # ⚠️ OBRIGATÓRIO para emails - Configure no Portainer!
      MAIL_FROM: ${MAIL_FROM:-noreply@climbdelivery.com.br}
      FRONTEND_URL: ${FRONTEND_URL:-https://${WEB_DOMAIN:-climbdelivery.com.br}}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    networks:
      - climb_network      # Rede interna - conecta com MySQL
      - traefik_public     # Rede externa - expõe via Traefik
    labels:
      # ===== LABELS DO TRAEFIK =====
      # Estes labels instruem o Traefik a rotear tráfego para este container
      
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      
      # 🌐 Roteamento HTTPS: api.climbdelivery.com.br → este container
      - "traefik.http.routers.climb-api.rule=Host(`${API_DOMAIN:-api.climbdelivery.com.br}`)"
      - "traefik.http.routers.climb-api.entrypoints=websecure"
      
      # 🔒 SSL automático via Let's Encrypt
      - "traefik.http.routers.climb-api.tls=true"
      - "traefik.http.routers.climb-api.tls.certresolver=letsencryptresolver"
      
      # 🌐 Roteamento HTTP: redireciona para HTTPS
      - "traefik.http.routers.climb-api-http.rule=Host(`${API_DOMAIN:-api.climbdelivery.com.br}`)"
      - "traefik.http.routers.climb-api-http.entrypoints=web"
      - "traefik.http.routers.climb-api-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      
      # ⚙️ Porta interna do container (Node.js roda na 3000)
      - "traefik.http.services.climb-api.loadbalancer.server.port=3000"

  # ==========================================
  # Frontend (Angular)
  # ==========================================
  # Container do frontend em Nginx
  # Serve arquivos estáticos do Angular compilado
  # Exposto na internet via Traefik
  
  frontend:
    image: climb-delivery-frontend:latest
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - backend
    networks:
      - traefik_public     # Rede externa - expõe via Traefik
    labels:
      # ===== LABELS DO TRAEFIK =====
      
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      
      # 🌐 Roteamento HTTPS: climbdelivery.com.br → este container
      # Aceita com e sem www
      - "traefik.http.routers.climb-web.rule=Host(`${WEB_DOMAIN:-climbdelivery.com.br}`) || Host(`www.${WEB_DOMAIN:-climbdelivery.com.br}`)"
      - "traefik.http.routers.climb-web.entrypoints=websecure"
      
      # 🔒 SSL automático via Let's Encrypt
      - "traefik.http.routers.climb-web.tls=true"
      - "traefik.http.routers.climb-web.tls.certresolver=letsencryptresolver"
      
      # 🌐 Roteamento HTTP: redireciona para HTTPS
      - "traefik.http.routers.climb-web-http.rule=Host(`${WEB_DOMAIN:-climbdelivery.com.br}`) || Host(`www.${WEB_DOMAIN:-climbdelivery.com.br}`)"
      - "traefik.http.routers.climb-web-http.entrypoints=web"
      - "traefik.http.routers.climb-web-http.middlewares=redirect-to-https"
      
      # ⚙️ Porta interna do container (Nginx roda na 8080 - veja nginx.conf)
      - "traefik.http.services.climb-web.loadbalancer.server.port=8080"
      
      # Redirect www → non-www (OPCIONAL - descomente se quiser)
      # - "traefik.http.middlewares.climb-web-redirect.redirectregex.regex=^https://www\\.(.+)"
      # - "traefik.http.middlewares.climb-web-redirect.redirectregex.replacement=https://$$1"
      # - "traefik.http.middlewares.climb-web-redirect.redirectregex.permanent=true"
      # - "traefik.http.routers.climb-web.middlewares=climb-web-redirect"

# ==========================================
# Networks
# ==========================================
# climb_network: Rede interna para Backend ↔ MySQL
# network_public: Rede externa para Traefik ↔ Frontend/Backend

networks:
  climb_network:
    driver: overlay
    attachable: true
  traefik_public:
    name: network_public
    external: true

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql_data:
    driver: local

# ============================================
# NOTAS IMPORTANTES
# ============================================
# 1. Build das imagens ANTES de criar a stack:
#    cd /opt/climb-delivery-api
#    docker build -t climb-delivery-backend:latest .
#    cd /opt/climb-delivery-app
#    docker build -t climb-delivery-frontend:latest .
#
# 2. Configure as variáveis de ambiente no Portainer UI:
#    - WEB_DOMAIN (padrão: climbdelivery.com.br)
#    - API_DOMAIN (padrão: api.climbdelivery.com.br)
#    - MYSQL_ROOT_PASSWORD (sem padrão - OBRIGATÓRIO!)
#    - MYSQL_PASSWORD (sem padrão - OBRIGATÓRIO!)
#    - JWT_SECRET (sem padrão - OBRIGATÓRIO!)
#    - MAIL_USER, MAIL_PASSWORD (obrigatório para envio de emails)
#
# 3. A rede traefik_public deve existir (criada pelo seu Traefik)
#
# 4. SSL é configurado automaticamente pelo Traefik via Let's Encrypt
#
# ============================================
# VARIÁVEIS COM VALORES PADRÃO
# ============================================
# Estas variáveis têm valores padrão e podem ser sobrescritas:
#
# WEB_DOMAIN: climbdelivery.com.br
# API_DOMAIN: api.climbdelivery.com.br
# MYSQL_DATABASE: climbdelivery
# MYSQL_USER: climbdelivery_user
# NODE_ENV: production
# PORT: 3000
# JWT_EXPIRATION: 7d
# MAX_FILE_SIZE: 10485760 (10MB)
# MAIL_HOST: smtp.gmail.com
# MAIL_PORT: 587
# MAIL_FROM: noreply@climbdelivery.com.br
#
# ============================================
# VARIÁVEIS SEM PADRÃO (OBRIGATÓRIAS)
# ============================================
# Estas DEVEM ser configuradas no Portainer:
#
# MYSQL_ROOT_PASSWORD - Senha root do MySQL
# MYSQL_PASSWORD - Senha do usuário MySQL
# JWT_SECRET - Chave secreta JWT (use senha forte!)
# MAIL_USER - Email SMTP
# MAIL_PASSWORD - Senha do email SMTP
# ============================================
#
# 4. SSL é configurado automaticamente pelo Traefik via Let's Encrypt
