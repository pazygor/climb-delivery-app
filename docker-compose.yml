version: '3.8'

services:
  # ==================================
  # BACKEND API
  # ==================================
  api:
    build:
      context: ./climb-delivery-api
      dockerfile: Dockerfile
    image: climb-delivery-api:latest
    container_name: climb-delivery-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    networks:
      - traefik-public
      - internal
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      
      # HTTP Router
      - "traefik.http.routers.climb-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.climb-api.entrypoints=websecure"
      - "traefik.http.routers.climb-api.tls=true"
      - "traefik.http.routers.climb-api.tls.certresolver=letsencrypt"
      
      # Service
      - "traefik.http.services.climb-api.loadbalancer.server.port=3000"
      
      # Middlewares
      - "traefik.http.routers.climb-api.middlewares=climb-api-headers"
      - "traefik.http.middlewares.climb-api-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ==================================
  # FRONTEND
  # ==================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: climb-delivery-web:latest
    container_name: climb-delivery-web
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      
      # HTTP Router
      - "traefik.http.routers.climb-web.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.climb-web.entrypoints=websecure"
      - "traefik.http.routers.climb-web.tls=true"
      - "traefik.http.routers.climb-web.tls.certresolver=letsencrypt"
      
      # Service
      - "traefik.http.services.climb-web.loadbalancer.server.port=8080"
      
      # Middlewares (redirect www to non-www)
      - "traefik.http.routers.climb-web.middlewares=climb-web-headers"
      - "traefik.http.middlewares.climb-web-headers.headers.customresponseheaders.X-Frame-Options=SAMEORIGIN"
      - "traefik.http.middlewares.climb-web-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
