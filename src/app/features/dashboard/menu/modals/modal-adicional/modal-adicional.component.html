<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{width: '500px'}"
  (onHide)="fechar()">
  
  <ng-template pTemplate="header">
    <h3>{{ tituloModal }}</h3>
  </ng-template>

  <div class="modal-content">
    <div class="field">
      <label for="nome" class="required">Nome do adicional</label>
      <input 
        id="nome"
        type="text" 
        pInputText 
        [(ngModel)]="nome"
        placeholder="Ex.: Bacon, Queijo Extra, Molho Especial..."
        class="w-full"
        [disabled]="loading"
        autofocus />
    </div>

    <div class="field">
      <label for="descricao">Descrição (opcional)</label>
      <textarea 
        id="descricao"
        pInputTextarea 
        [(ngModel)]="descricao"
        placeholder="Descrição adicional..."
        class="w-full"
        rows="3"
        [disabled]="loading">
      </textarea>
    </div>

    <div class="field">
      <label for="preco" class="required">Preço</label>
      <p-inputNumber
        id="preco"
        [(ngModel)]="preco"
        mode="currency"
        currency="BRL"
        locale="pt-BR"
        [min]="0"
        [minFractionDigits]="2"
        [maxFractionDigits]="2"
        placeholder="R$ 0,00"
        class="w-full"
        [disabled]="loading">
      </p-inputNumber>
      <small class="help-text">Valor adicional ao preço do produto</small>
    </div>

    <div class="field-checkbox">
      <input 
        type="checkbox" 
        id="ativo"
        [(ngModel)]="ativo"
        [disabled]="loading" />
      <label for="ativo">Adicional ativo</label>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button 
      pButton 
      label="Cancelar" 
      icon="pi pi-times"
      class="p-button-text"
      (click)="fechar()"
      [disabled]="loading">
    </button>
    <button 
      pButton 
      [label]="adicional ? 'Salvar' : 'Criar'"
      icon="pi pi-check"
      (click)="salvar()"
      [loading]="loading">
    </button>
  </ng-template>
</p-dialog>
